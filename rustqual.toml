# rustqual.toml -- Structural quality analyzer configuration for minibox
#
# Minibox is a multi-crate Rust workspace with hexagonal architecture:
#   minibox-core  -- domain types, protocol, ports, error types
#   minibox       -- lib crate: adapters, daemon server, container runtime
#   miniboxd      -- bin crate: composition root (main, adapter registry)
#   minibox-cli   -- bin crate: CLI client (not yet wired)
#
# Layer order (inside-out):
#   domain < port < infrastructure < adapter < application


# ── Global settings ────────────────────────────────────────────────────

# Composition-root dispatchers and visitor methods are exempt from IOSP.
ignore_functions = [
    "main",
    "run",
]

# Test fixtures, conformance harness, build scripts, macros crate.
exclude_files = [
    "crates/minibox-conformance/**",
    "crates/minibox-macros/**",
    "crates/minibox-crux-plugin/**",
    "crates/macbox/**",
    "crates/winbox/**",
    "crates/mbx/**",
    "xtask/**",
    "scripts/**",
    "target/**",
]

strict_closures = false
strict_iterator_chains = false
allow_recursion = false
strict_error_propagation = false
max_suppression_ratio = 0.10


# ── Complexity ─────────────────────────────────────────────────────────

[complexity]
enabled = true
# Container setup code is inherently complex; start lenient.
# max_cognitive = 20
# max_cyclomatic = 12
# max_nesting_depth = 5
# max_function_lines = 80
# detect_unsafe = true
# detect_error_handling = true
# minibox uses expect() in tests per project convention
allow_expect = false


# ── DRY / Duplicate Detection ─────────────────────────────────────────

[duplicates]
enabled = true


# ── Boilerplate Detection ─────────────────────────────────────────────

[boilerplate]
enabled = true


# ── SRP (Single Responsibility) ───────────────────────────────────────

[srp]
enabled = true


# ── Coupling Analysis ─────────────────────────────────────────────────

[coupling]
enabled = true


# ── Structural Binary Checks ──────────────────────────────────────────

[structural]
enabled = true


# ── Test Quality ───────────────────────────────────────────────────────

[test_quality]
enabled = true


# ── Quality Score Weights ──────────────────────────────────────────────
#
# Architecture weighted higher -- hexagonal discipline is critical
# for a multi-adapter container runtime.

[weights]
iosp         = 0.18
complexity   = 0.15
dry          = 0.12
srp          = 0.15
coupling     = 0.10
test_quality = 0.12
architecture = 0.18


# ══════════════════════════════════════════════════════════════════════
# Architecture Dimension
# ══════════════════════════════════════════════════════════════════════

[architecture]
enabled = true


# ── Layer definitions ──────────────────────────────────────────────────
#
# Inside-out: domain (rank 0) through application (rank 4).
#
# minibox-core owns domain + ports.
# minibox (lib) owns adapters + daemon infrastructure.
# miniboxd (bin) is the composition root / application layer.

[architecture.layers]
order = ["domain", "port", "infrastructure", "adapter", "application"]
unmatched_behavior = "composition_root"

[architecture.layers.domain]
paths = [
    "crates/minibox-core/src/domain.rs",
    "crates/minibox-core/src/domain/**",
    "crates/minibox-core/src/error.rs",
    "crates/minibox-core/src/protocol.rs",
    "crates/minibox-core/src/events.rs",
    "crates/minibox-core/src/typestate.rs",
    "crates/minibox/src/domain.rs",
    "crates/minibox/src/domain/**",
    "crates/minibox/src/error.rs",
]

[architecture.layers.port]
paths = [
    "crates/minibox-core/src/trace.rs",
    "crates/minibox-core/src/preflight.rs",
    "crates/minibox/src/preflight.rs",
]

[architecture.layers.infrastructure]
paths = [
    "crates/minibox-core/src/image/**",
    "crates/minibox-core/src/client/**",
    "crates/minibox-core/src/tracing_init.rs",
    "crates/minibox/src/container_state.rs",
    "crates/minibox/src/container/**",
]

[architecture.layers.adapter]
paths = [
    "crates/minibox-core/src/adapters/**",
    "crates/minibox/src/adapters/**",
    "crates/minibox/src/daemon/**",
    "crates/minibox/src/testing/**",
]

[architecture.layers.application]
paths = [
    "crates/miniboxd/src/**",
]


# ── Re-export points ──────────────────────────────────────────────────

[architecture.reexport_points]
paths = [
    "crates/minibox-core/src/lib.rs",
    "crates/minibox/src/lib.rs",
    "crates/miniboxd/src/lib.rs",
    "crates/miniboxd/src/main.rs",
    "tests/**",
]


# ── External-crate mapping ────────────────────────────────────────────
#
# minibox-core is treated as domain+port; minibox as adapter.
# rustqual resolves cross-crate imports via these mappings.

[architecture.external_crates]
# minibox_core = "domain"


# ── Forbidden edges ───────────────────────────────────────────────────

# Domain must not reach into adapters or daemon.
[[architecture.forbidden]]
from = "crates/minibox-core/src/domain/**"
to   = "crates/minibox/src/adapters/**"
reason = "Domain types must not depend on adapter implementations"

[[architecture.forbidden]]
from = "crates/minibox-core/src/domain/**"
to   = "crates/miniboxd/src/**"
reason = "Domain must not know about the application layer"

# Protocol types must not import adapter code.
[[architecture.forbidden]]
from = "crates/minibox-core/src/protocol.rs"
to   = "crates/minibox/src/adapters/**"
reason = "Protocol is domain-level; adapters implement it, not the reverse"

# Adapters must not import from the composition root.
[[architecture.forbidden]]
from = "crates/minibox/src/adapters/**"
to   = "crates/miniboxd/src/**"
reason = "Adapters must not depend on the application/composition root"

# Individual adapters should not cross-import each other.
# Each adapter (colima, smolvm, docker_desktop, etc.) is self-contained.
[[architecture.forbidden]]
from = "crates/minibox/src/adapters/colima.rs"
to   = "crates/minibox/src/adapters/smolvm.rs"
reason = "Adapters are isolated; shared logic goes in mod.rs or domain"

[[architecture.forbidden]]
from = "crates/minibox/src/adapters/smolvm.rs"
to   = "crates/minibox/src/adapters/colima.rs"
reason = "Adapters are isolated; shared logic goes in mod.rs or domain"

[[architecture.forbidden]]
from = "crates/minibox/src/adapters/docker_desktop.rs"
to   = "crates/minibox/src/adapters/colima.rs"
reason = "Adapters are isolated"

[[architecture.forbidden]]
from = "crates/minibox/src/adapters/docker_desktop.rs"
to   = "crates/minibox/src/adapters/smolvm.rs"
reason = "Adapters are isolated"


# ── Symbol rules: Domain purity ────────────────────────────────────────

# No filesystem or network I/O types in domain.
[[architecture.pattern]]
name = "no_io_in_domain"
forbid_path_prefix = ["tokio::fs::", "tokio::net::", "std::fs::", "std::net::"]
forbidden_in = [
    "crates/minibox-core/src/domain.rs",
    "crates/minibox-core/src/domain/**",
    "crates/minibox-core/src/protocol.rs",
]
reason = "Domain and protocol types must be I/O-free"

# No process spawning in domain.
[[architecture.pattern]]
name = "no_process_in_domain"
forbid_path_prefix = ["tokio::process::", "std::process::"]
forbidden_in = [
    "crates/minibox-core/src/domain.rs",
    "crates/minibox-core/src/domain/**",
]
reason = "Process management is an adapter concern"

# No container/OS primitives in domain.
[[architecture.pattern]]
name = "no_nix_in_domain"
forbid_path_prefix = ["nix::", "libc::"]
forbidden_in = [
    "crates/minibox-core/src/domain.rs",
    "crates/minibox-core/src/domain/**",
    "crates/minibox-core/src/protocol.rs",
]
reason = "OS primitives belong in adapters, not domain types"


# ── Symbol rules: Error handling ───────────────────────────────────────

# No .unwrap() in production code (project rule: use .context()?).
[[architecture.pattern]]
name = "no_unwrap_in_production"
forbid_method_call = ["unwrap"]
forbidden_in = [
    "crates/minibox-core/src/**",
    "crates/minibox/src/**",
    "crates/miniboxd/src/**",
]
except = ["**/tests/**", "**/test_fixtures.rs", "**/mocks.rs"]
reason = "Use .context()? in production; .expect() in tests"

# No println/dbg in library code.
[[architecture.pattern]]
name = "no_stdout_in_library"
forbid_macro_call = ["println", "print", "dbg"]
forbidden_in = [
    "crates/minibox-core/src/**",
    "crates/minibox/src/**",
]
except = ["**/tests/**"]
reason = "Use tracing macros, not stdout"

# No panic macros in production.
[[architecture.pattern]]
name = "no_panic_macros"
forbid_macro_call = ["todo", "unimplemented"]
forbidden_in = [
    "crates/minibox-core/src/**",
    "crates/minibox/src/**",
    "crates/miniboxd/src/**",
]
except = ["**/tests/**"]
reason = "Production code must handle errors, not panic"


# ── Symbol rules: Composition root boundary ────────────────────────────

# clap only in the binary crates.
[[architecture.pattern]]
name = "clap_only_in_bins"
forbid_path_prefix = ["clap::"]
allowed_in = [
    "crates/miniboxd/src/**",
    "crates/minibox-cli/src/**",
    "**/tests/**",
]
reason = "CLI parsing belongs in composition root, not library crates"


# ── Trait contracts: Port traits ───────────────────────────────────────
#
# Port traits in minibox-core must be object-safe and Send+Sync
# for use with dynamic dispatch across adapters.

[[architecture.trait_contract]]
name = "core_port_traits"
scope = "crates/minibox-core/src/domain.rs"
receiver_may_be = ["shared_ref", "mutable_ref"]
forbidden_return_type_contains = ["Box<dyn"]
must_be_object_safe = true
required_supertraits_contain = ["Send", "Sync"]


# ══════════════════════════════════════════════════════════════════════
# Report
# ══════════════════════════════════════════════════════════════════════

[report]
aggregation = "loc_weighted"
