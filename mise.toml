[tools]
rust = "1.91.1"

[tasks]

[tasks.ci]
description = "Snapshot current Gitea CI status for minibox"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
REPO="joe/minibox"
VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
SSH_OPTS="-o IdentitiesOnly=yes -o IdentityAgent=none -o PreferredAuthentications=password -o StrictHostKeyChecking=no"
TOKEN_NAME="ci-snap-$$"

# Generate a short-lived API token via the VPS
TOKEN=$(sshpass -p "$VPS_PASS" ssh $SSH_OPTS dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

# Fetch runs + active jobs in parallel
RUNS=$(curl -sf -H "Authorization: token $TOKEN" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/runs?limit=15")
JOBS=$(curl -sf -H "Authorization: token $TOKEN" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/tasks?limit=20" 2>/dev/null || echo '{}')

python3 <<PYEOF
import json, datetime, sys

runs = json.loads('''$RUNS''').get("workflow_runs", [])
tasks = json.loads('''$JOBS''').get("workflow_tasks", [])

# Index active task names by run_id
active = {}
for t in tasks:
    rid = t.get("run_id")
    if t.get("status") in ("in_progress", "queued", "waiting"):
        active.setdefault(rid, []).append(t.get("name", ""))

def icon(status, conclusion):
    if status == "completed":
        return {"success": "✓", "failure": "✗", "cancelled": "○"}.get(conclusion or "", "?")
    return {"in_progress": "●", "queued": "◌", "waiting": "⋯"}.get(status, "?")

def fmt_time(ts):
    if not ts:
        return ""
    try:
        dt = datetime.datetime.fromisoformat(ts.replace("Z", "+00:00"))
        return dt.strftime("%m-%d %H:%M")
    except Exception:
        return ts[:16]

print(f"{'#':>4}  {'':2}  {' STATUS/RESULT':<20}  {'TIME':12}  TITLE")
print("─" * 82)
for r in runs:
    rid   = r.get("id", "")
    stat  = r.get("status", "")
    conc  = r.get("conclusion", "") or ""
    title = r.get("display_title", "")[:48]
    ts    = fmt_time(r.get("created_at", ""))
    ic    = icon(stat, conc)
    label = f"{stat}/{conc}" if conc else stat
    print(f"{rid:>4}  {ic:2}  {label:<20}  {ts:12}  {title}")
    for job in active.get(rid, []):
        print(f"{'':>4}  {'':2}  {'  ↳ ' + job}")
PYEOF
"""

[tasks."bench:setup"]
description = "One-time setup: clone minibox repo on VPS and compile minibox-bench"
run = """
#!/usr/bin/env bash
set -euo pipefail

VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
SSH_OPTS="-o IdentitiesOnly=yes -o IdentityAgent=none -o PreferredAuthentications=password -o StrictHostKeyChecking=no"

sshpass -p "$VPS_PASS" ssh $SSH_OPTS dev@100.105.75.7 'bash -s' <<'ENDSSH'
set -euo pipefail

REPO_DIR=~/minibox

if [ -d "$REPO_DIR/.git" ]; then
  echo "Pulling latest..."
  git -C "$REPO_DIR" pull
else
  echo "Cloning repo..."
  git clone http://100.105.75.7:3000/joe/minibox "$REPO_DIR"
fi

echo "Building minibox-bench..."
cd "$REPO_DIR"
~/.local/bin/mise exec -- cargo build --release -p minibox-bench

echo "✓ minibox-bench ready at $REPO_DIR/target/release/minibox-bench"
ENDSSH
"""

[tasks.bench]
description = "Run minibox-bench on VPS and post results as a Gitea commit comment"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
REPO="joe/minibox"
COMMIT_SHA=$(git rev-parse HEAD)

VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
SSH_OPTS="-o IdentitiesOnly=yes -o IdentityAgent=none -o PreferredAuthentications=password -o StrictHostKeyChecking=no"
TOKEN_NAME="bench-$$"

TOKEN=$(sshpass -p "$VPS_PASS" ssh $SSH_OPTS dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

BENCH_OUT=$(sshpass -p "$VPS_PASS" ssh $SSH_OPTS dev@100.105.75.7 'bash -s' <<'ENDSSH'
set -euo pipefail

BENCH_BIN=~/minibox/target/release/minibox-bench

if [ ! -f "$BENCH_BIN" ]; then
  echo "error: minibox-bench not found — run: mise run bench:setup" >&2; exit 1
fi

if ! command -v minibox &>/dev/null; then
  echo "error: minibox not installed on VPS" >&2; exit 1
fi

if [ ! -S /run/minibox/miniboxd.sock ]; then
  echo "error: miniboxd not running — start the daemon first" >&2; exit 1
fi

OUT_DIR="/tmp/bench-out-$$"
rm -rf "$OUT_DIR"
"$BENCH_BIN" --iters 5 --out-dir "$OUT_DIR"
JSON_FILE=$(ls -t "$OUT_DIR"/*.json | head -1)
cp "$JSON_FILE" /tmp/bench-latest.json
ls -t "$OUT_DIR"/*.txt | head -1 | xargs cat
rm -rf "$OUT_DIR"
ENDSSH
)

echo "$BENCH_OUT"

# SCP JSON result back for devloop ingestion
mkdir -p bench/results
sshpass -p "$VPS_PASS" scp $SSH_OPTS \
  dev@100.105.75.7:/tmp/bench-latest.json bench/results/latest.json \
  && echo "✓ bench/results/latest.json written" \
  || echo "warning: could not SCP JSON result (results still printed above)" >&2

COMMENT_BODY=$(python3 -c "
import json, sys
sha = sys.argv[1]
out = sys.argv[2]
bt = chr(96) * 3
body = '## Benchmark Results\n\n**Host:** jobrien-vm | **Commit:** ' + sha[:8] + '\n\n' + bt + '\n' + out + '\n' + bt
print(json.dumps({'body': body}))
" "$COMMIT_SHA" "$BENCH_OUT")

STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
  -H "Authorization: token $TOKEN" \
  -H "Content-Type: application/json" \
  -d "$COMMENT_BODY" \
  "$GITEA_URL/api/v1/repos/$REPO/commits/$COMMIT_SHA/comments")

[[ "$STATUS" == "201" ]] \
  && echo "✓ Results posted: $GITEA_URL/$REPO/commit/$COMMIT_SHA" \
  || echo "warning: HTTP $STATUS posting comment (results printed above)" >&2
"""

[tasks."ci:set-secret"]
description = "Set a Gitea Actions secret (usage: mise run ci:set-secret -- NAME value)"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
REPO="joe/minibox"
SECRET_NAME="${1:?usage: mise run ci:set-secret -- NAME value}"
SECRET_VALUE="${2:?usage: mise run ci:set-secret -- NAME value}"

VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
SSH_OPTS="-o IdentitiesOnly=yes -o IdentityAgent=none -o PreferredAuthentications=password -o StrictHostKeyChecking=no"
TOKEN_NAME="ci-secret-$$"

TOKEN=$(sshpass -p "$VPS_PASS" ssh $SSH_OPTS dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
  -H "Authorization: token $TOKEN" \
  -H "Content-Type: application/json" \
  -d "{\"data\": \"$SECRET_VALUE\"}" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/secrets/$SECRET_NAME")

[[ "$STATUS" == "201" || "$STATUS" == "204" ]] \
  && echo "✓ $SECRET_NAME set (HTTP $STATUS)" \
  || { echo "error: HTTP $STATUS setting $SECRET_NAME" >&2; exit 1; }
"""
