[tools]
rust = "1.91.1"

[tasks]

[tasks.ci]
description = "Snapshot current Gitea CI status for minibox"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
REPO="joe/minibox"
VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
TOKEN_NAME="ci-snap-$$"

# Generate a short-lived API token via the VPS
TOKEN=$(sshpass -p "$VPS_PASS" ssh -o IdentitiesOnly=yes -o IdentityAgent=none -o PubkeyAuthentication=no -o PreferredAuthentications=password -o StrictHostKeyChecking=no dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

# Fetch runs + active jobs in parallel
RUNS=$(curl -sf -H "Authorization: token $TOKEN" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/runs?limit=15")
JOBS=$(curl -sf -H "Authorization: token $TOKEN" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/tasks?limit=20" 2>/dev/null || echo '{}')

python3 <<PYEOF
import json, datetime, sys

runs = json.loads('''$RUNS''').get("workflow_runs", [])
tasks = json.loads('''$JOBS''').get("workflow_tasks", [])

# Index active task names by run_id
active = {}
for t in tasks:
    rid = t.get("run_id")
    if t.get("status") in ("in_progress", "queued", "waiting"):
        active.setdefault(rid, []).append(t.get("name", ""))

def icon(status, conclusion):
    if status == "completed":
        return {"success": "✓", "failure": "✗", "cancelled": "○"}.get(conclusion or "", "?")
    return {"in_progress": "●", "queued": "◌", "waiting": "⋯"}.get(status, "?")

def fmt_time(ts):
    if not ts:
        return ""
    try:
        dt = datetime.datetime.fromisoformat(ts.replace("Z", "+00:00"))
        return dt.strftime("%m-%d %H:%M")
    except Exception:
        return ts[:16]

print(f"{'#':>4}  {'':2}  {' STATUS/RESULT':<20}  {'TIME':12}  TITLE")
print("─" * 82)
for r in runs:
    rid   = r.get("id", "")
    stat  = r.get("status", "")
    conc  = r.get("conclusion", "") or ""
    title = r.get("display_title", "")[:48]
    ts    = fmt_time(r.get("created_at", ""))
    ic    = icon(stat, conc)
    label = f"{stat}/{conc}" if conc else stat
    print(f"{rid:>4}  {ic:2}  {label:<20}  {ts:12}  {title}")
    for job in active.get(rid, []):
        print(f"{'':>4}  {'':2}  {'  ↳ ' + job}")
PYEOF
"""

[tasks."bench:setup"]
description = "One-time setup: clone minibox repo on VPS and compile minibox-bench"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
TOKEN_NAME="bench-setup-$$"

TOKEN=$(sshpass -p "$VPS_PASS" ssh -o IdentitiesOnly=yes -o IdentityAgent=none -o PubkeyAuthentication=no -o PreferredAuthentications=password -o StrictHostKeyChecking=no dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

sshpass -p "$VPS_PASS" ssh -o IdentitiesOnly=yes -o IdentityAgent=none -o PubkeyAuthentication=no -o PreferredAuthentications=password -o StrictHostKeyChecking=no dev@100.105.75.7 \
  "GITEA_TOKEN=$TOKEN bash -s" <<'ENDSSH'
set -euo pipefail

REPO_DIR=~/minibox
CLONE_URL="http://joe:${GITEA_TOKEN}@100.105.75.7:3000/joe/minibox"

if [ -d "$REPO_DIR/.git" ]; then
  echo "Pulling latest..."
  git -C "$REPO_DIR" remote set-url origin "$CLONE_URL"
  git -C "$REPO_DIR" pull
else
  echo "Cloning repo..."
  git clone "$CLONE_URL" "$REPO_DIR"
fi

# Strip credentials from remote URL after clone
git -C "$REPO_DIR" remote set-url origin "http://100.105.75.7:3000/joe/minibox"

CURRENT_SHA=$(git -C "$REPO_DIR" rev-parse HEAD 2>/dev/null || echo "")
BUILT_SHA=$(cat "$REPO_DIR/.bench-built-sha" 2>/dev/null || echo "")
BENCH_BIN="$REPO_DIR/target/release/minibox-bench"

if [ "$CURRENT_SHA" = "$BUILT_SHA" ] && [ -f "$BENCH_BIN" ]; then
  echo "✓ minibox-bench up to date (${CURRENT_SHA:0:8}), skipping build"
else
  echo "Building minibox-bench (${CURRENT_SHA:0:8})..."
  cd "$REPO_DIR"
  ~/.local/bin/mise trust
  ~/.local/bin/mise exec -- cargo build --release -p minibox-bench
  echo "$CURRENT_SHA" > "$REPO_DIR/.bench-built-sha"
  echo "✓ minibox-bench built"
fi
ENDSSH
"""

[tasks.bench]
description = "Run minibox-bench on VPS and post results as a Gitea commit comment"
run = "cargo xtask bench-vps"

[tasks."ci:set-secret"]
description = "Set a Gitea Actions secret (usage: mise run ci:set-secret -- NAME value)"
run = """
#!/usr/bin/env bash
set -euo pipefail

GITEA_URL="http://100.105.75.7:3000"
REPO="joe/minibox"
SECRET_NAME="${1:?usage: mise run ci:set-secret -- NAME value}"
SECRET_VALUE="${2:?usage: mise run ci:set-secret -- NAME value}"

VPS_PASS=$(op item get jobrien-vm --account=my.1password.com --fields password --reveal 2>/dev/null)
TOKEN_NAME="ci-secret-$$"

TOKEN=$(sshpass -p "$VPS_PASS" ssh -o IdentitiesOnly=yes -o IdentityAgent=none -o PubkeyAuthentication=no -o PreferredAuthentications=password -o StrictHostKeyChecking=no dev@100.105.75.7 \
  "echo '$VPS_PASS' | sudo -Su git /usr/local/bin/gitea admin user generate-access-token \
    --username joe --token-name $TOKEN_NAME --raw \
    --config /var/lib/gitea/custom/conf/app.ini 2>/dev/null")

[[ -z "$TOKEN" ]] && { echo "error: could not generate Gitea token" >&2; exit 1; }

cleanup() {
  curl -sf -X DELETE -H "Authorization: token $TOKEN" \
    "$GITEA_URL/api/v1/users/joe/tokens/$TOKEN_NAME" >/dev/null 2>&1 || true
}
trap cleanup EXIT

BODY=$(python3 -c "import json, sys; print(json.dumps({'data': sys.argv[1]}))" "$SECRET_VALUE")

STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
  -H "Authorization: token $TOKEN" \
  -H "Content-Type: application/json" \
  -d "$BODY" \
  "$GITEA_URL/api/v1/repos/$REPO/actions/secrets/$SECRET_NAME")

[[ "$STATUS" == "201" || "$STATUS" == "204" ]] \
  && echo "✓ $SECRET_NAME set (HTTP $STATUS)" \
  || { echo "error: HTTP $STATUS setting $SECRET_NAME" >&2; exit 1; }
"""

