name: Conformance

on:
  push:
    branches: [develop, next, staging]
  pull_request:
    branches: [develop, next, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      core:        ${{ steps.dc.outputs.core }}
      runtime:     ${{ steps.dc.outputs.runtime }}
      conformance: ${{ steps.dc.outputs.conformance }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: detect changes
        id: dc
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$BASE_REF"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BASE="origin/main"
          else
            BASE="HEAD^"
          fi
          cargo xtask detect-changes "$BASE"

  conformance:
    name: conformance suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [detect-changes]
    if: |
      needs.detect-changes.outputs.core == 'true' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.conformance == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: run conformance suite
        run: cargo run -p minibox-testsuite --bin run-conformance

      - name: upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-${{ matrix.os }}
          path: artifacts/conformance/
          retention-days: 30

      - name: post summary
        if: always()
        run: |
          REPORT=artifacts/conformance/report.md
          if [ -f "$REPORT" ]; then
            echo "## Conformance Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          fi
