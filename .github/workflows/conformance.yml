name: Conformance

on:
  push:
    branches: [develop, next, staging]
  pull_request:
    branches: [develop, next, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  conformance:
    name: conformance suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: run conformance suite
        run: cargo run -p minibox-conformance --bin run-conformance

      - name: upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-${{ matrix.os }}
          path: artifacts/conformance/
          retention-days: 30

      - name: post summary
        if: always()
        run: |
          REPORT=artifacts/conformance/report.md
          if [ -f "$REPORT" ]; then
            echo "## Conformance Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          fi
