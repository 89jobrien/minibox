name: Quality

on:
  push:
    branches: [main, next, stable, "feature/*", "hotfix/*", "chore/*"]
  pull_request:
    branches: [main, next]

jobs:
  compile-check:
    name: compile + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace
      - name: cargo build --locked
        run: cargo build --locked --workspace
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy -p minibox -p minibox-macros -p minibox-cli -p daemonbox -p macbox -p miniboxd -- -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  test-unit:
    name: unit tests (Linux)
    runs-on: [self-hosted, minibox]
    needs: compile-check
    steps:
      - uses: actions/checkout@v4
      - name: cargo xtask test-unit
        run: ~/.local/bin/mise exec -- cargo xtask test-unit

  geiger:
    name: unsafe audit (geiger)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stable'
    needs: compile-check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger
        id: geiger
        run: |
          cargo geiger -p minibox -p minibox-macros -p minibox-cli -p daemonbox 2>&1 | tee geiger-report.txt
          echo "## cargo geiger report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 geiger-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: upload geiger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  test-e2e:
    name: e2e tests (Linux, root)
    runs-on: [self-hosted, minibox]
    needs: test-unit
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - name: cargo xtask test-e2e-suite
        run: ~/.local/bin/mise exec -- cargo xtask test-e2e-suite
