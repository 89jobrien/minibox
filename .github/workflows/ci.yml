name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # fmt/clippy/unit tests are covered by local xtask pre-commit/prepush hooks.
  # This job runs on the self-hosted jobrien-vm (Linux) for miniboxd-specific
  # tests that require Linux — no toolchain installation or compilation setup
  # needed since the runner has Rust pre-installed.
  linux:
    name: Linux (miniboxd)
    runs-on: [self-hosted, minibox]
    steps:
      - uses: actions/checkout@v4
      - name: xtask unit tests
        run: ~/.local/bin/mise exec -- cargo xtask test-unit
      - name: miniboxd unit tests
        run: ~/.local/bin/mise exec -- cargo nextest run -p miniboxd --lib
