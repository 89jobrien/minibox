name: Quality

on:
  push:
    branches: [main, next, stable, "feature/*", "hotfix/*", "chore/*"]
  pull_request:
    branches: [main, next]

env:
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: lint + fmt
    runs-on: [self-hosted, minibox-mac]
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt + clippy + check
        run: |
          cargo fmt --all --check
          cargo clippy -p minibox -p minibox-macros -p mbx -p macbox -p miniboxd -p minibox-core -p winbox -- -D warnings
          cargo check --workspace

  build-test-archive:
    name: build test archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo build --locked
        run: cargo build --locked --workspace
      - name: cargo nextest archive
        run: cargo nextest archive --workspace --archive-file nextest-archive.tar.zst
      - name: upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

  test-unit:
    name: unit tests (macOS)
    runs-on: [self-hosted, minibox-mac]
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run (unit tests)
        run: cargo nextest run --workspace --lib

  test-archive:
    name: test from archive (ubuntu)
    runs-on: ubuntu-latest
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: run tests from archive
        run: cargo nextest run --archive-file nextest-archive.tar.zst --workspace-remap .

  test-all-features:
    name: test with all features
    runs-on: ubuntu-latest
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest --all-features (lib, exclude macOS-only crates)
        run: cargo nextest run --all-features --workspace --exclude macbox --exclude miniboxd --lib
      - name: cargo test --all-features (doc)
        run: cargo test --all-features --workspace --exclude macbox --exclude miniboxd --doc

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  geiger:
    name: unsafe audit (geiger)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stable'
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger
        id: geiger
        run: |
          set -euo pipefail
          cargo geiger -p minibox -p minibox-macros -p mbx -p miniboxd 2>&1 | tee geiger-report.txt
          {
            echo "## cargo geiger report"
            echo '```'
            sed -n '1,30p' geiger-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload geiger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  test-e2e:
    name: e2e tests (Linux, root)
    runs-on: [self-hosted, minibox]
    needs: test-unit
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - name: cargo xtask test-e2e-suite
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo xtask test-e2e-suite
