name: Quality

on:
  push:
    branches: [main, "feature/*", "hotfix/*", "chore/*"]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  test-unit:
    name: unit tests (Linux)
    runs-on: [self-hosted, minibox]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask test-unit
        run: ~/.local/bin/mise exec -- cargo xtask test-unit
  test-e2e:
    name: e2e tests (Linux, root)
    runs-on: [self-hosted, minibox]
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask test-e2e-suite
        run: ~/.local/bin/mise exec -- cargo xtask test-e2e-suite
