name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: deny + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
      - name: install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  lint:
    name: machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: cargo machete
        run: cargo machete

  macos-colima:
    name: macOS Colima smoke
    runs-on: macos-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Colima + Lima
        run: brew install colima lima
      - name: Start Colima VM
        run: |
          colima start --vm-type vz --cpu 2 --memory 2
          colima status
      - name: Build daemon and CLI
        run: cargo build -p miniboxd -p minibox-cli --release
      - name: Smoke test
        run: |
          ./target/release/miniboxd &
          DAEMON_PID=$!
          sleep 3
          ./target/release/minibox pull alpine
          OUTPUT=$(./target/release/minibox run alpine -- /bin/echo "hello from minibox")
          echo "Output: $OUTPUT"
          echo "$OUTPUT" | grep -q "hello from minibox"
          kill $DAEMON_PID
          echo "Smoke test passed"

  coverage:
    name: coverage → codecov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: coverage
        run: >
          cargo llvm-cov nextest
          -p linuxbox -p minibox-macros -p minibox-cli -p daemonbox
          --lcov --output-path lcov.info
      - name: upload to codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
