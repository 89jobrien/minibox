name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Everything else (fmt, clippy, unit tests, handler/conformance tests) is
  # covered by pre-commit/pre-push hooks on the developer's macOS machine.
  # This job only runs what can't be done locally: miniboxd (Linux-only crate).
  linux:
    name: Linux (miniboxd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Clippy (full workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: miniboxd unit tests
        run: cargo nextest run -p miniboxd --lib
