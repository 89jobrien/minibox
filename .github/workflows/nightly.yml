name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  geiger:
    name: unsafe audit (geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger
        id: geiger
        run: |
          geiger_status=0
          : > geiger-report.txt
          for manifest in \
            crates/minibox/Cargo.toml \
            crates/minibox-macros/Cargo.toml \
            crates/mbx/Cargo.toml \
            crates/miniboxd/Cargo.toml
          do
            printf '\n## %s\n' "$manifest" | tee -a geiger-report.txt
            cargo geiger --manifest-path "$manifest" 2>&1 | tee -a geiger-report.txt
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              geiger_status="$status"
            fi
          done
          echo "## cargo geiger report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 geiger-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$geiger_status"
      - name: upload geiger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30

  tag-nightly:
    name: tag nightly release
    runs-on: ubuntu-latest
    needs: geiger
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: push nightly tag
        run: |
          TAG="nightly/$(date -u +%Y%m%d)"
          git tag "$TAG"
          git push origin "$TAG"
