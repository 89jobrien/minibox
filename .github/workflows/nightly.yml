name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  geiger:
    name: unsafe audit (geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: cargo geiger
        id: geiger
        run: |
          cargo geiger -p mbx -p minibox-macros -p minibox-cli -p daemonbox 2>&1 | tee geiger-report.txt
          # Extract unsafe counts and write to job summary
          echo "## cargo geiger report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 geiger-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: upload geiger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt
          retention-days: 30
