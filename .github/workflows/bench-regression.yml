name: Bench Regression

on:
  push:
    branches: [next, stable]
  workflow_dispatch:

jobs:
  bench:
    name: benchmark regression check
    runs-on: [self-hosted, minibox]
    steps:
      - uses: actions/checkout@v4

      - name: run benchmarks
        run: ~/.local/bin/mise exec -- cargo xtask bench

      - name: check regression against baseline
        run: |
          LATEST=bench/results/latest.json
          if [ ! -f "$LATEST" ]; then
            echo "No baseline found — skipping regression check."
            exit 0
          fi
          # Fail if any suite regresses more than 10% vs stored baseline
          ~/.local/bin/mise exec -- cargo xtask bench-check --threshold 10 --baseline "$LATEST"

      - name: upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results/
          retention-days: 30

      - name: post summary
        if: always()
        run: |
          echo "## Bench Results" >> "$GITHUB_STEP_SUMMARY"
          printf '```json\n' >> "$GITHUB_STEP_SUMMARY"
          python3 -c "import sys; sys.stdout.write(open('bench/results/latest.json').read())" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
