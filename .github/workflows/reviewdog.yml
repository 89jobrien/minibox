name: reviewdog

on:
  pull_request:
    branches: [main, next]

env:
  CARGO_INCREMENTAL: 0

jobs:
  reviewdog:
    name: reviewdog
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0

      - name: clippy
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo clippy --workspace --message-format=short 2>&1 |
            reviewdog -efm="%f:%l:%c: %t%*[^:]: %m" \
              -name=clippy \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=warning

      - name: rustfmt
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo fmt --all -- --check 2>&1 |
            reviewdog -f=diff \
              -name=rustfmt \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=warning

      - name: cargo-deny
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo deny check 2>&1 |
            reviewdog -efm="%f:%l:%c: %m" \
              -name=cargo-deny \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=error
