name: Merge

on:
  push:
    branches: [main, next, stable, "feature/*", "hotfix/*", "chore/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: lint + fmt (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt + clippy + check
        run: |
          cargo fmt --all --check
          cargo clippy -p minibox -p minibox-macros -p mbx -p miniboxd -p minibox-core -p winbox -- -D warnings
          cargo check --workspace

  test-unit:
    name: unit tests (ubuntu)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run (unit tests)
        run: cargo nextest run --workspace --exclude macbox --lib

  build-test-archive:
    name: build test archive
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo build --locked
        run: cargo build --locked --workspace
      - name: cargo nextest archive
        run: cargo nextest archive --workspace --archive-file nextest-archive.tar.zst
      - name: upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

  test-archive:
    name: test from archive (ubuntu)
    runs-on: ubuntu-latest
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: run tests from archive
        run: cargo nextest run --archive-file nextest-archive.tar.zst --workspace-remap .

  test-all-features:
    name: test with all features
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest --all-features (lib, exclude macOS-only crates)
        run: cargo nextest run --all-features --workspace --exclude macbox --exclude miniboxd --lib
      - name: cargo test --all-features (doc)
        run: cargo test --all-features --workspace --exclude macbox --exclude miniboxd --doc

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  test-e2e:
    name: e2e tests (Linux, root)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - name: cargo xtask test-e2e-suite
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo xtask test-e2e-suite

  test-integration:
    name: integration tests (Linux, root)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - name: cargo xtask test-integration
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo xtask test-integration

  test-protocol-e2e-linux:
    name: protocol e2e (Linux)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    steps:
      - uses: actions/checkout@v4
      - name: build daemon + cli
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release -p miniboxd -p mbx
      - name: protocol e2e tests
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo test -p miniboxd --test protocol_e2e_tests --release -- --test-threads=1 --nocapture

  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - test-unit
      - build-test-archive
      - test-archive
      - test-all-features
      - audit
      - deny
      - machete
      - test-e2e
      - test-integration
      - test-protocol-e2e-linux
    steps:
      - name: check job results
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.test-unit.result }}"
            "${{ needs.build-test-archive.result }}"
            "${{ needs.test-archive.result }}"
            "${{ needs.test-all-features.result }}"
            "${{ needs.audit.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.machete.result }}"
            "${{ needs.test-e2e.result }}"
            "${{ needs.test-integration.result }}"
            "${{ needs.test-protocol-e2e-linux.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed: at least one job reported $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"

  cleanup-linux:
    name: cleanup (Linux)
    runs-on: [self-hosted, minibox]
    if: always() && contains(fromJSON('["refs/heads/next","refs/heads/stable"]'), github.ref)
    needs: [test-e2e, test-integration, test-protocol-e2e-linux]
    steps:
      - uses: actions/checkout@v4
      - name: clean build artifacts and test state
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo xtask clean-artifacts
          cargo xtask nuke-test-state
