name: Merge

on:
  push:
    branches: [develop, main, next, staging, "feature/*", "hotfix/*", "chore/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      core:      ${{ steps.dc.outputs.core }}
      daemon:    ${{ steps.dc.outputs.daemon }}
      cli:       ${{ steps.dc.outputs.cli }}
      runtime:   ${{ steps.dc.outputs.runtime }}
      xtask:     ${{ steps.dc.outputs.xtask }}
      workflows: ${{ steps.dc.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: detect changes
        id: dc
        run: cargo xtask detect-changes HEAD^

  lint:
    name: lint + fmt (ubuntu)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      contains(fromJSON('["refs/heads/develop","refs/heads/next"]'), github.ref) && (
        needs.detect-changes.outputs.core == 'true' ||
        needs.detect-changes.outputs.daemon == 'true' ||
        needs.detect-changes.outputs.cli == 'true' ||
        needs.detect-changes.outputs.runtime == 'true' ||
        needs.detect-changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask lint
        run: cargo xtask lint

  test-unit:
    name: unit tests (ubuntu)
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: |
      contains(fromJSON('["refs/heads/develop","refs/heads/next"]'), github.ref) && (
        needs.detect-changes.outputs.core == 'true' ||
        needs.detect-changes.outputs.daemon == 'true' ||
        needs.detect-changes.outputs.cli == 'true' ||
        needs.detect-changes.outputs.runtime == 'true' ||
        needs.detect-changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo xtask test-unit
        run: cargo xtask test-unit

  build-test-archive:
    name: build test archive
    runs-on: ubuntu-latest
    needs: [lint]
    if: contains(fromJSON('["refs/heads/develop","refs/heads/next"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo build --locked
        run: cargo build --locked --workspace
      - name: cargo nextest archive
        run: cargo nextest archive --workspace --archive-file nextest-archive.tar.zst
      - name: upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

  test-archive:
    name: test from archive (ubuntu)
    runs-on: ubuntu-latest
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: run tests from archive
        run: cargo nextest run --archive-file nextest-archive.tar.zst --workspace-remap .

  test-all-features:
    name: test with all features
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/develop","refs/heads/next"]'), github.ref)
    needs: build-test-archive
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest --all-features (lib, exclude macOS-only crates)
        run: cargo nextest run --all-features --workspace --exclude macbox --exclude miniboxd --lib
      - name: cargo test --all-features (doc)
        run: cargo test --all-features --workspace --exclude macbox --exclude miniboxd --doc

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.4
          sudo mv actionlint /usr/local/bin/
      - name: run actionlint
        run: actionlint -config-file .github/actionlint.yaml .github/workflows/*.yml

  test-e2e:
    name: e2e tests (Linux, root)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - name: cargo xtask test-e2e-suite
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo fetch --locked
          cargo xtask test-e2e-suite

  test-integration:
    name: integration tests (Linux, root)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - name: cargo xtask test-integration
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo fetch --locked
          cargo xtask test-integration

  test-protocol-e2e-linux:
    name: protocol e2e (Linux)
    runs-on: [self-hosted, minibox]
    if: contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    steps:
      - uses: actions/checkout@v5
      - name: cargo xtask test-e2e
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo fetch --locked
          cargo xtask test-e2e

  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - lint
      - test-unit
      - build-test-archive
      - test-archive
      - test-all-features
      - audit
      - deny
      - machete
      - actionlint
      - test-e2e
      - test-integration
      - test-protocol-e2e-linux
    steps:
      - name: check job results
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.test-unit.result }}"
            "${{ needs.build-test-archive.result }}"
            "${{ needs.test-archive.result }}"
            "${{ needs.test-all-features.result }}"
            "${{ needs.audit.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.machete.result }}"
            "${{ needs.actionlint.result }}"
            "${{ needs.test-e2e.result }}"
            "${{ needs.test-integration.result }}"
            "${{ needs.test-protocol-e2e-linux.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed: at least one job reported $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"

  promote-staging:
    name: promote next → staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/next'
    needs: [ci-ok]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: merge next into staging
        run: |
          git fetch origin staging
          git checkout staging
          git merge --ff-only origin/next || git merge origin/next -m "Merge branch 'next' into staging"
          git push origin staging

  cleanup-linux:
    name: cleanup (Linux)
    runs-on: [self-hosted, minibox]
    if: always() && contains(fromJSON('["refs/heads/next","refs/heads/staging"]'), github.ref)
    needs: [test-e2e, test-integration, test-protocol-e2e-linux]
    steps:
      - uses: actions/checkout@v5
      - name: clean build artifacts and test state
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo fetch --locked
          cargo xtask clean-artifacts
          cargo xtask nuke-test-state
