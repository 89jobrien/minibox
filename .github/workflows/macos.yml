name: macOS

on:
  push:
    branches: [main, next, staging, "feature/*", "hotfix/*", "chore/*"]
  pull_request:
    branches: [main, next]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: lint + fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask lint
        run: cargo xtask lint

  test-unit:
    name: unit tests (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo xtask test-unit
        run: cargo xtask test-unit

  test-protocol-e2e:
    name: protocol e2e (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask test-e2e
        run: cargo xtask test-e2e

  cancel-on-failure:
    name: cancel on failure
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-protocol-e2e]
    if: failure()
    steps:
      - name: cancel workflow run
        run: gh run cancel $RUN_ID --repo $REPO
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
