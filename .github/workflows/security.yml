name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily security scan at 02:00 UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-deny:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  clippy-security:
    name: Security Lints (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-security-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-security-
      - name: Run Clippy with security lints
        run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -W clippy::suspicious

  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config=auto --error

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [cargo-deny, cargo-audit, clippy-security, semgrep]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Security scan complete"
          echo "cargo-deny: ${{ needs.cargo-deny.result }}"
          echo "cargo-audit: ${{ needs.cargo-audit.result }}"
          echo "clippy-security: ${{ needs.clippy-security.result }}"
          echo "semgrep: ${{ needs.semgrep.result }}"

      - name: Fail if any scan failed
        if: |
          needs.cargo-deny.result == 'failure' ||
          needs.cargo-audit.result == 'failure' ||
          needs.clippy-security.result == 'failure' ||
          needs.semgrep.result == 'failure'
        run: exit 1
