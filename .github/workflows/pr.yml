name: PR

on:
  pull_request:
    branches: [main, next]

env:
  CARGO_INCREMENTAL: 0

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      core:        ${{ steps.dc.outputs.core }}
      daemon:      ${{ steps.dc.outputs.daemon }}
      cli:         ${{ steps.dc.outputs.cli }}
      runtime:     ${{ steps.dc.outputs.runtime }}
      conformance: ${{ steps.dc.outputs.conformance }}
      xtask:       ${{ steps.dc.outputs.xtask }}
      docs:        ${{ steps.dc.outputs.docs }}
      workflows:   ${{ steps.dc.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: detect changes
        id: dc
        env:
          BASE_REF: ${{ github.base_ref }}
        run: cargo xtask detect-changes "$BASE_REF"

  lint:
    name: lint + fmt
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      needs.detect-changes.outputs.core == 'true' ||
      needs.detect-changes.outputs.daemon == 'true' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.xtask == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask lint
        run: cargo xtask lint

  test-unit:
    name: unit tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: |
      needs.detect-changes.outputs.core == 'true' ||
      needs.detect-changes.outputs.daemon == 'true' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.runtime == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo xtask test-unit
        run: cargo xtask test-unit

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          sudo mv actionlint /usr/local/bin/
      - name: run actionlint
        run: actionlint -config-file .github/actionlint.yaml .github/workflows/*.yml

  cancel-on-failure:
    name: cancel on failure
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: failure()
    steps:
      - name: cancel workflow run
        run: gh run cancel "$RUN_ID" --repo "$REPO"
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
