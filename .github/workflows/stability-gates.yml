name: Stability Gates

on:
  push:
    branches: [main, next, staging, "feature/*", "hotfix/*", "chore/*", "feat/*"]
  pull_request:
    branches: [main, next]

jobs:
  doc-sync:
    name: doc-sync (FEATURE_MATRIX staleness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: FEATURE_MATRIX must be updated within 90 days
        run: |
          LAST_COMMIT=$(git log -1 --format="%ct" -- docs/FEATURE_MATRIX.md)
          if [ -z "$LAST_COMMIT" ]; then
            echo "ERROR: docs/FEATURE_MATRIX.md has never been committed."
            exit 1
          fi
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
          echo "docs/FEATURE_MATRIX.md last updated ${AGE_DAYS} days ago."
          if [ "$AGE_DAYS" -gt 90 ]; then
            echo "ERROR: FEATURE_MATRIX.md is stale (${AGE_DAYS} days). Update it before merging."
            exit 1
          fi
          echo "OK: within 90-day freshness window."

  adapter-integration-tests:
    name: adapter integration test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask check-adapter-coverage
        run: cargo xtask check-adapter-coverage

  no-unwrap-in-prod:
    name: no .unwrap() in production code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask check-no-unwrap
        run: cargo xtask check-no-unwrap --strict

  stability-compile:
    name: stability compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check workspace (stability gate)
        run: cargo check --workspace
      - name: clippy stability crates
        run: |
          cargo clippy \
            -p minibox-core \
            -p minibox \
            -p macbox \
            -p winbox \
            -- -D warnings

  check-stale-names:
    name: stale crate/binary name audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask check-stale-names
        run: cargo xtask check-stale-names

  check-protocol-sites:
    name: HandlerDependencies construction site count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo xtask check-protocol-sites
        run: cargo xtask check-protocol-sites crates/miniboxd/src/main.rs --expected 4

  cancel-on-failure:
    name: cancel on failure
    runs-on: ubuntu-latest
    needs:
      - doc-sync
      - adapter-integration-tests
      - no-unwrap-in-prod
      - stability-compile
      - check-stale-names
      - check-protocol-sites
    if: failure()
    steps:
      - name: cancel workflow run
        run: gh run cancel "$RUN_ID" --repo "$REPO"
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
