name: Stability Gates

on:
  push:
    branches: [main, next, stable, "feature/*", "hotfix/*", "chore/*", "feat/*"]
  pull_request:
    branches: [main, next]

jobs:
  doc-sync:
    name: doc-sync (FEATURE_MATRIX staleness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: FEATURE_MATRIX must be updated within 90 days
        run: |
          LAST_COMMIT=$(git log -1 --format="%ct" -- docs/FEATURE_MATRIX.md)
          if [ -z "$LAST_COMMIT" ]; then
            echo "ERROR: docs/FEATURE_MATRIX.md has never been committed."
            exit 1
          fi
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
          echo "docs/FEATURE_MATRIX.md last updated ${AGE_DAYS} days ago."
          if [ "$AGE_DAYS" -gt 90 ]; then
            echo "ERROR: FEATURE_MATRIX.md is stale (${AGE_DAYS} days). Update it before merging."
            exit 1
          fi
          echo "OK: within 90-day freshness window."

  adapter-integration-tests:
    name: adapter integration test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Each wired adapter must have an integration test file
        run: |
          FAIL=0
          for ADAPTER in native gke colima; do
            FILES=$(ls crates/minibox/tests/*${ADAPTER}* 2>/dev/null | wc -l)
            if [ "$FILES" -eq 0 ]; then
              echo "ERROR: No integration test file for adapter '${ADAPTER}' in crates/minibox/tests/"
              FAIL=1
            else
              echo "OK: adapter '${ADAPTER}' has ${FILES} integration test file(s)."
            fi
          done
          exit $FAIL

  no-unwrap-in-prod:
    name: no .unwrap() in production code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan non-test Rust source for .unwrap() calls
        run: |
          # Collect files with .unwrap() that are NOT test-only infrastructure.
          # Inline #[cfg(test)] modules are excluded via a second-pass filter.
          ALL_HITS=$(grep -rn '\.unwrap()' \
            --include='*.rs' \
            crates/ \
            --exclude-dir=xtask \
            --exclude-dir=testing \
            | grep -v '/tests/' \
            | grep -v '/examples/' \
            | grep -v '/benches/' \
            | grep -v 'minibox-core/src/adapters/' \
            | grep -v '// allow:unwrap' \
            || true)

          # Second pass: for each hit, check if the line number falls after
          # a #[cfg(test)] or #[test] marker in the same file. This is a
          # conservative heuristic — it removes hits in test modules.
          PROD_HITS=""
          while IFS=: read -r FILE LINE REST; do
            [ -z "$FILE" ] && continue
            # Find the last #[cfg(test)] line number in this file
            TEST_START=$(grep -n '#\[cfg(test)\]' "$FILE" 2>/dev/null | tail -1 | cut -d: -f1)
            if [ -n "$TEST_START" ] && [ "$LINE" -ge "$TEST_START" ]; then
              continue  # inside test module
            fi
            # Also skip if line itself is in a #[test] fn
            TEST_FN=$(sed -n "1,${LINE}p" "$FILE" | grep -c '#\[test\]' || true)
            PROD_FN=$(sed -n "1,${LINE}p" "$FILE" | grep -c 'fn ' || true)
            # Heuristic: if the most recent #[test] is closer than the most
            # recent non-test fn, skip. But this is complex — just use cfg(test).
            PROD_HITS="${PROD_HITS}${FILE}:${LINE}:${REST}"$'\n'
          done <<< "$ALL_HITS"

          PROD_HITS=$(echo "$PROD_HITS" | sed '/^$/d')
          if [ -n "$PROD_HITS" ]; then
            COUNT=$(echo "$PROD_HITS" | wc -l)
            echo "WARNING: ${COUNT} .unwrap() calls found outside test infrastructure."
            echo "Review these — use .context()? in production code:"
            echo "$PROD_HITS"
            echo ""
            echo "NOTE: This gate is advisory. Inline #[cfg(test)] unwraps are expected."
            # Advisory — do not fail the build for inline test module unwraps.
            # The cfg(test) heuristic catches most but not all cases.
          fi
          echo "OK: unwrap scan complete."

  stability-compile:
    name: stability compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check workspace (stability gate)
        run: cargo check --workspace
      - name: clippy stability crates
        run: |
          cargo clippy \
            -p minibox-core \
            -p minibox \
            -p macbox \
            -p winbox \
            -- -D warnings
