name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p minibox-macros
          sleep 30
          cargo publish -p minibox-core
          sleep 30

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binaries
        run: |
          cross build --release --target ${{ matrix.target }} -p miniboxd -p mbx

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          ARCHIVE="minibox-${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/miniboxd dist/
          cp target/${{ matrix.target }}/release/mbx dist/
          tar -czf "${ARCHIVE}" -C dist miniboxd mbx
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minibox-${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
