[workspace]
resolver = "3"
members = [
    "crates/minibox-lib",
    "crates/miniboxd",
    "crates/minibox-cli",
    "crates/minibox-bench",
    "crates/minibox-macros",
    "crates/daemonbox",
    "crates/macbox",
    "crates/winbox",
    "crates/minibox-llm",
    "xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.85"

[workspace.dependencies]
# Shared across workspace
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
nix = { version = "0.29", features = ["sched", "mount", "fs", "signal", "process", "hostname", "user", "socket"] }
libc = "0.2"
bytes = "1"
futures = "0.3"
tempfile = "3"
async-trait = "0.1"
walkdir = "2"
base64 = "0.22"

# Benchmarking
criterion = { version = "0.5", features = ["async_tokio"] }

# Internal crates
minibox-lib = { path = "crates/minibox-lib" }
minibox-macros = { path = "crates/minibox-macros" }
daemonbox = { path = "crates/daemonbox" }
macbox = { path = "crates/macbox" }
winbox = { path = "crates/winbox" }
dirs = "5"
