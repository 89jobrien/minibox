[workspace]
resolver = "2"
members = [
    "crates/minibox-lib",
    "crates/miniboxd",
    "crates/minibox-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
rust-version = "1.75"

[workspace.dependencies]
# Shared across workspace
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
nix = { version = "0.29", features = ["sched", "mount", "fs", "signal", "process", "hostname", "user"] }
libc = "0.2"
bytes = "1"
futures = "0.3"
tempfile = "3"
async-trait = "0.1"
walkdir = "2"

# Benchmarking
criterion = { version = "0.5", features = ["async_tokio"] }

# Internal crates
minibox-lib = { path = "crates/minibox-lib" }
