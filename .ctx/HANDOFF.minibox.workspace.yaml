- id: minibox-26
  name: fork-after-runtime
  priority: P2
  status: done
  title: 'bug(exec): fork() inside active Tokio runtime — POSIX undefined behaviour
    (#60)'
  description: 'GH #60: libc::fork() is called from spawn_blocking while background
    Tokio threads are live.

    Any thread holding the allocator/Tokio/tracing mutex at fork time will deadlock
    the

    child. Risk is load-dependent and non-deterministic — safe in single-developer
    use,

    hazardous before any multi-user or concurrent-exec deployment.

    Options: (A) minibox-pty helper binary via Command::new (preferred), (B) pre-Tokio

    supervisor thread. No urgency until concurrent exec is needed.'
  files:
  - crates/mbx/src/adapters/exec.rs
  extra:
  - type: github-issue
    number: 60
    url: https://github.com/89jobrien/minibox/issues/60
  - date: 2026-04-07
    type: note
    note: 'GitHub issue #60 open. Low urgency — latent, not triggered in current single-user
      use.'
  completed: '2026-04-17'
