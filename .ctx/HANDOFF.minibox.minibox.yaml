- id: minibox-nightly-geiger
  doob_uuid: null
  name: nightly-geiger-nonblocking
  priority: P1
  status: done
  title: 'fix(ci): make cargo-geiger non-blocking in nightly workflow'
  description: |
    cargo-geiger exits 1 on "Failed to match (ignoring source) package: valuable@0.1.1" —
    a known geiger bug with certain crate graphs. This blocks tag-nightly from running.
    Fix: add `continue-on-error: true` to the geiger job in nightly.yml so the nightly
    tag always fires regardless of geiger result.
  files:
  - .github/workflows/nightly.yml
  completed: 2026-05-09
  extra: []
