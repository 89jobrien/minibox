name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fmt
        run: ~/.local/bin/mise exec -- cargo fmt --all --check
      - name: deny
        run: ~/.local/bin/mise exec -- cargo deny check
      - name: audit
        run: ~/.local/bin/mise exec -- cargo audit

  diagnose:
    name: Diagnose Failures
    runs-on: ubuntu-latest
    needs: [lint]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: run diagnosis agent
        env:
          GITEA_URL: http://100.105.75.7:3000
          CI_AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ gitea.repository }}
          RUN_ID: ${{ gitea.run_id }}
          COMMIT_SHA: ${{ gitea.sha }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ci_agent.py
