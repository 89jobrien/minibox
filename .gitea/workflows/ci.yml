name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: unit tests
        run: ~/.local/bin/mise exec -- cargo xtask test-unit

  property:
    name: Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: property tests
        run: ~/.local/bin/mise exec -- cargo xtask test-property

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit, property]
    steps:
      - uses: actions/checkout@v4
      - name: integration tests
        run: sudo -E ~/.local/bin/mise exec -- cargo xtask test-integration
      - name: cleanup
        if: always()
        run: sudo -E ~/.local/bin/mise exec -- cargo xtask nuke-test-state

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit, property]
    steps:
      - uses: actions/checkout@v4
      - name: daemon + CLI e2e
        # xtask test-e2e-suite internally calls `sudo -E` for the test binary
        run: ~/.local/bin/mise exec -- cargo xtask test-e2e-suite
      - name: cleanup
        if: always()
        run: sudo -E ~/.local/bin/mise exec -- cargo xtask nuke-test-state

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [integration, e2e]
    steps:
      - uses: actions/checkout@v4
      - name: bench
        run: sudo -E ~/.local/bin/mise exec -- cargo xtask bench

  diagnose:
    name: Diagnose Failures
    runs-on: ubuntu-latest
    needs: [unit, property, integration, e2e, bench]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: run diagnosis agent
        env:
          GITEA_URL: http://100.105.75.7:3000
          CI_AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ gitea.repository }}
          RUN_ID: ${{ gitea.run_id }}
          COMMIT_SHA: ${{ gitea.sha }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ci_agent.py
